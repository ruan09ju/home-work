<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職涯特質 - 鐘元汝</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Microsoft JhengHei', sans-serif; }
        .hero-section { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #333; padding: 80px 0; text-align: center; }
        .profile-img { width: 180px; height: 180px; border-radius: 50%; border: 5px solid white; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-link { font-weight: bold; color: #555 !important; }
        .nav-link:hover { color: #ff6b6b !important; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">首頁</a>
                <a class="nav-link" href="ucan.html">測驗結果</a>
                <a class="nav-link" href="job.html">目標工作</a>
                <a class="nav-link" href="plan.html">未來規劃</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-5 fw-bold">UCAN 職業興趣診斷結果</h2>
        <div class="row align-items-center">
            <div class="col-md-6 mb-4">
                <div class="bg-white p-4 rounded shadow-sm">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm p-4">
                    <h3 class="text-primary mb-3">職業性格代碼：IAR</h3>
                    <p><strong>研究型 (I) - 7分：</strong> 擅長觀察與分析，喜歡解決複雜問題。</p>
                    <p><strong>藝術型 (A) - 5分：</strong> 具有獨特的直覺與創意，重視美感。</p>
                    <p><strong>實用型 (R) - 5分：</strong> 喜歡動手操作，講求實事求是。</p>
                    <hr>
                    <p class="mb-0 text-secondary">適合相關領域：<strong>資訊科技、醫療保健......等</strong></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('radarChart');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['研究 (I)', '藝術 (A)', '實用 (R)', '事務 (C)', '社會 (S)', '企業 (E)'],
                datasets: [{
                    label: '興趣分布',
                    data: [7, 5, 5, 4, 3, 1],
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderColor: 'rgb(255, 99, 132)',
                    borderWidth: 2
                }]
            },
            options: { scales: { r: { suggestMin: 0, suggestMax: 10 } } }
        });
    </script>
</body>
</html>
